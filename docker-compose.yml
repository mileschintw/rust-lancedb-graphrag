version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: lancet-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lancet
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lancet"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.19.0
    container_name: lancet-jaeger
    ports:
      - "127.0.0.1:16686:16686" # Jaeger Web UI
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver
      - "127.0.0.1:4318:4318"   # OTLP HTTP receiver
    volumes:
      - ./jaeger-config.yaml:/etc/jaeger/jaeger-config.yaml
    command: ["--config", "/etc/jaeger/jaeger-config.yaml"]

volumes:
  postgres_data:
